<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаурма от Мамуки</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
        }
        
        .header {
            background: #8b1e1e;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ddd;
            overflow: hidden;
            border: 3px solid white;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .header-text h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .footer {
            background: #8b1e1e;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 14px;
            border-top: 2px solid #fff3cd;
            margin-top: 20px;
        }
        
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .tab.active {
            color: #8b1e1e;
            border-bottom: 3px solid #8b1e1e;
        }
        
        .content {
            padding: 20px;
        }
        
        .menu-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
        
        .menu-item-row {
            display: flex;
            align-items: center;
        }
        
        .menu-item-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .menu-info {
            flex: 1;
            margin-left: 15px;
        }
        
        .menu-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .menu-info .price {
            font-size: 20px;
            font-weight: bold;
            color: #8b1e1e;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #8b1e1e;
            background: white;
            color: #8b1e1e;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .quantity-btn:hover {
            background: #8b1e1e;
            color: white;
        }
        
        .quantity {
            font-size: 16px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: bold;
        }
        
        .cart-item-addons {
            font-size: 12px;
            color: #f57c00;
            margin-top: 3px;
        }
        
        .cart-item-price {
            font-weight: bold;
        }
        
        .cart-total {
            margin-top: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 18px;
        }
        
        .order-form {
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .order-btn {
            width: 100%;
            padding: 15px;
            background: #8b1e1e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        
        .order-btn:hover {
            background: #6b1616;
        }
        
        .orders-list {
            margin-top: 20px;
        }
        
        .order-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .order-number {
            font-weight: bold;
            font-size: 16px;
        }
        
        .order-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-pending {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-preparing {
            background: #fff8e1;
            color: #f57c00;
        }
        
        .status-ready {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .order-items {
            margin: 10px 0;
            color: #666;
        }
        
        .order-item-row {
            margin-bottom: 5px;
        }
        
        .order-item-addons {
            font-size: 12px;
            color: #f57c00;
            margin-left: 15px;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .order-price {
            font-weight: bold;
            color: #8b1e1e;
        }
        
        .hidden {
            display: none !important;
        }
        
        .working-hours-warning {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #c62828;
        }
        
        .cart-item-addons-selector {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .addons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 8px;
        }
        
        .addon-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">
                <img src="images/mamuka.jpg" alt="Мамука" onerror="this.style.display='none'; this.parentElement.innerHTML='🥙';">
            </div>
            <div class="header-text">
                <h1>ШАУРМА ОТ МАМУКИ</h1>
                <p>🥙 Самая вкусная у колледжа</p>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('menu')">МЕНЮ</div>
            <div class="tab" onclick="switchTab('orders')">МОИ ЗАКАЗЫ</div>
        </div>
        
        <div class="content" id="menuTab"></div>
        <div class="content hidden" id="ordersTab">
            <div id="ordersList"></div>
        </div>
        
        <div class="footer">
            <div>🏠 пр-т Независимости, 58А</div>
            <div style="margin-top: 5px;">⏰ пн–сб 9:00 – 20:00</div>
        </div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ
        // ============================================
        
        const WORK_START = 9;
        const WORK_END = 20;
        const WORK_DAYS = [1, 2, 3, 4, 5, 6]; // пн-сб
        
        let menuItems = [];
        let addons = [];
        let cart = []; // [{ id, quantity, addons }]
        let orders = [];
        
        const timeOptions = [15, 20, 25, 30, 35, 40, 45];
        
        // ============================================
        // УНИКАЛЬНЫЙ ID КЛИЕНТА
        // ============================================
        
        function getClientId() {
            let clientId = localStorage.getItem('client_id');
            if (!clientId) {
                clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('client_id', clientId);
            }
            return clientId;
        }
        
        const CURRENT_CLIENT_ID = getClientId();
        
        // ============================================
        // ПРОВЕРКА РАБОЧЕГО ВРЕМЕНИ
        // ============================================
        
        function isWorkingTime() {
            const now = new Date();
            const currentDay = now.getDay();
            const currentHour = now.getHours();
            return WORK_DAYS.includes(currentDay) && currentHour >= WORK_START && currentHour < WORK_END;
        }
        
        // ============================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================
        
        async function loadMenu() {
            const { data, error } = await supabaseClient
                .from('menu')
                .select('*')
                .eq('is_available', true);
            
            if (!error) menuItems = data || [];
        }
        
        async function loadAddons() {
            const { data, error } = await supabaseClient
                .from('addons')
                .select('*')
                .eq('is_available', true);
            
            if (!error) addons = data || [];
        }
        
        async function loadOrders() {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .eq('client_id', CURRENT_CLIENT_ID)
                .order('created_at', { ascending: false });
            
            if (!error) {
                orders = data || [];
                renderOrders();
            }
        }
        
        // ============================================
        // НОМЕР ЗАКАЗА
        // ============================================
        
        function getTodayDate() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }
        
        async function getNextOrderNumber() {
            const today = getTodayDate();
            
            const { data, error } = await supabaseClient
                .from('orders')
                .select('order_number')
                .gte('created_at', today + ' 00:00:00')
                .lt('created_at', today + ' 23:59:59');
            
            if (error || !data || data.length === 0) return 1;
            
            const numbers = data.map(o => o.order_number);
            return Math.max(...numbers) + 1;
        }
        
        // ============================================
        // РАБОТА С КОРЗИНОЙ
        // ============================================
        
        function addToCart(itemId) {
            cart.push({ 
                id: itemId, 
                quantity: 1,
                addons: [] 
            });
            renderMenu();
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            renderMenu();
        }
        
        function updateCartQuantity(index, delta) {
            if (index < 0 || index >= cart.length) return;
            
            const newQty = cart[index].quantity + delta;
            if (newQty <= 0) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity = newQty;
            }
            
            renderMenu();
        }
        
        function toggleItemAddon(index, addonId) {
            if (index < 0 || index >= cart.length) return;
            
            const item = cart[index];
            const addonIndex = item.addons.indexOf(addonId);
            
            if (addonIndex === -1) {
                item.addons.push(addonId);
            } else {
                item.addons.splice(addonIndex, 1);
            }
            
            renderMenu();
        }
        
        function getItemTotal(item) {
            const menuItem = menuItems.find(m => m.id === item.id);
            if (!menuItem) return 0;
            
            let total = menuItem.price * item.quantity;
            
            item.addons.forEach(addonId => {
                const addon = addons.find(a => a.id === addonId);
                if (addon) total += addon.price * item.quantity;
            });
            
            return total;
        }
        
        function getCartTotal() {
            return cart.reduce((sum, item) => sum + getItemTotal(item), 0);
        }
        
        // ============================================
        // ОФОРМЛЕНИЕ ЗАКАЗА
        // ============================================
        
        async function placeOrder() {
            if (cart.length === 0) return;
            
            if (!isWorkingTime()) {
                alert('⏰ Заказы принимаются только с понедельника по субботу с 9:00 до 20:00');
                return;
            }
            
            const time = document.getElementById('orderTime').value;
            const payment = document.getElementById('orderPayment').value;
            const orderNumber = await getNextOrderNumber();
            
            const order = {
                order_number: orderNumber,
                items: cart.map(item => ({
                    id: item.id,
                    quantity: item.quantity,
                    addons: item.addons
                })),
                total: getCartTotal(),
                payment_method: payment,
                pickup_time: parseInt(time),
                status: 'pending',
                client_id: CURRENT_CLIENT_ID
            };
            
            const { error } = await supabaseClient.from('orders').insert([order]);
            
            if (!error) {
                cart = [];
                switchTab('orders');
                loadOrders();
            }
        }
        
        // ============================================
        // РЕНДЕР
        // ============================================
        
        function renderMenu() {
            const menuTab = document.getElementById('menuTab');
            let html = '';
            
            const workingNow = isWorkingTime();
            
            // Меню
            menuItems.forEach(item => {
                html += `
                    <div class="menu-item">
                        <div class="menu-item-row">
                            <img src="${item.image_url || 'images/placeholder.jpg'}" alt="${item.name}" class="menu-item-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'80\' height=\'80\' viewBox=\'0 0 80 80\'><rect width=\'80\' height=\'80\' fill=\'%23f0f0f0\'/><text x=\'40\' y=\'45\' font-size=\'30\' text-anchor=\'middle\' fill=\'%23999\'>🥙</text></svg>'">
                            <div class="menu-info">
                                <h3>${item.name}</h3>
                                <div class="price">${item.price} BYN</div>
                            </div>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="addToCart(${item.id})">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            // Корзина
            if (cart.length > 0) {
                html += '<div class="cart-section">';
                html += '<h3>Корзина</h3>';
                
                cart.forEach((item, index) => {
                    const menuItem = menuItems.find(m => m.id === item.id);
                    const itemTotal = getItemTotal(item);
                    
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">
                                    ${menuItem.name} 
                                    <button class="quantity-btn" style="width: 25px; height: 25px; font-size: 14px;" onclick="updateCartQuantity(${index}, -1)">-</button>
                                    ${item.quantity}
                                    <button class="quantity-btn" style="width: 25px; height: 25px; font-size: 14px;" onclick="updateCartQuantity(${index}, 1)">+</button>
                                    <button style="background: none; border: none; color: #999; cursor: pointer; margin-left: 10px;" onclick="removeFromCart(${index})">✕</button>
                                </div>
                    `;
                    
                    if (item.addons.length > 0) {
                        const addonNames = item.addons.map(addonId => {
                            const a = addons.find(a => a.id === addonId);
                            return a ? a.name : '';
                        }).filter(Boolean).join(', ');
                        
                        html += `<div class="cart-item-addons">➕ ${addonNames}</div>`;
                    }
                    
                    // Добавки для этой позиции
                    if (menuItem.has_addons && addons.length > 0) {
                        html += '<div class="cart-item-addons-selector">';
                        html += '<div style="font-size: 13px; margin-bottom: 5px;">Добавки:</div>';
                        html += '<div class="addons-grid">';
                        
                        addons.forEach(addon => {
                            const checked = item.addons.includes(addon.id);
                            html += `
                                <div class="addon-item">
                                    <input type="checkbox" 
                                        ${checked ? 'checked' : ''} 
                                        onchange="toggleItemAddon(${index}, ${addon.id})">
                                    <span>${addon.name} ${addon.price > 0 ? '+'+addon.price+' BYN' : ''}</span>
                                </div>
                            `;
                        });
                        
                        html += '</div></div>';
                    }
                    
                    html += `
                            </div>
                            <div class="cart-item-price">${itemTotal} BYN</div>
                        </div>
                    `;
                });
                
                html += `<div class="cart-total">Итого: ${getCartTotal()} BYN</div>`;
                
                if (!workingNow) {
                    html += '<div class="working-hours-warning">⏰ Сейчас нерабочее время. Заказы принимаются только пн–сб 9:00–20:00</div>';
                } else {
                    html += `
                        <div class="order-form">
                            <div class="form-group">
                                <label>⏱ Когда придете?</label>
                                <select id="orderTime">
                                    ${timeOptions.map(t => `<option value="${t}">Через ${t} мин</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>💰 Оплата</label>
                                <select id="orderPayment">
                                    <option value="Наличные">Наличными в заведении</option>
                                    <option value="Карта">Картой в заведении</option>
                                </select>
                            </div>
                            <button class="order-btn" onclick="placeOrder()">ЗАКАЗАТЬ</button>
                        </div>
                    `;
                }
                
                html += '</div>';
            }
            
            menuTab.innerHTML = html;
        }
        
        function renderOrders() {
            const ordersList = document.getElementById('ordersList');
            
            const activeOrders = orders.filter(o => o.status !== 'completed');
            
            if (activeOrders.length === 0) {
                ordersList.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">У вас пока нет активных заказов</p>';
                return;
            }
            
            let html = '<div class="orders-list">';
            
            activeOrders.forEach(order => {
                let statusClass = 'status-pending';
                let statusText = 'Ожидается';
                
                if (order.status === 'preparing') {
                    statusClass = 'status-preparing';
                    statusText = 'Готовится';
                } else if (order.status === 'ready') {
                    statusClass = 'status-ready';
                    statusText = 'Готово';
                }
                
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-number">Заказ #${order.order_number}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="order-items">
                `;
                
                order.items.forEach(item => {
                    const menuItem = menuItems.find(m => m.id === item.id);
                    html += `<div class="order-item-row">${menuItem.name} x${item.quantity} = ${menuItem.price * item.quantity} BYN`;
                    
                    if (item.addons && item.addons.length > 0) {
                        const addonNames = item.addons.map(addonId => {
                            const a = addons.find(a => a.id === addonId);
                            return a ? a.name : '';
                        }).filter(Boolean).join(', ');
                        
                        html += `<div class="order-item-addons">➕ ${addonNames}</div>`;
                    }
                    
                    html += '</div>';
                });
                
                html += `
                        </div>
                        <div class="order-footer">
                            <span>Через ${order.pickup_time} мин · ${order.payment_method}</span>
                            <span class="order-price">${order.total} BYN</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            ordersList.innerHTML = html;
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('menuTab').classList.add('hidden');
            document.getElementById('ordersTab').classList.add('hidden');
            
            if (tab === 'menu') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('menuTab').classList.remove('hidden');
                renderMenu();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('ordersTab').classList.remove('hidden');
            }
        }
        
        // ============================================
        // ПОЛЛИНГ
        // ============================================
        
        setInterval(async () => {
            await loadOrders();
            if (document.getElementById('menuTab').classList.contains('hidden') === false) {
                renderMenu();
            }
        }, 3000);
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        async function init() {
            await loadMenu();
            await loadAddons();
            await loadOrders();
            renderMenu();
        }
        
        if (typeof supabaseClient !== 'undefined') {
            init();
        }
    </script>
</body>
</html>
