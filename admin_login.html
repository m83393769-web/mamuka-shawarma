<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админку - Мамука</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #8b1e1e, #4a0f0f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        
        .login-container h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }
        
        .login-container p {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        
        .input-group input:focus {
            border-color: #8b1e1e;
            outline: none;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #8b1e1e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .login-btn:hover {
            background: #6b1616;
        }
        
        .error {
            color: #c62828;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        
        .back-link:hover {
            color: #8b1e1e;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Мамука, заходи</h1>
        <p>Введи пароль, чтобы управлять заказами</p>
        
        <div class="input-group">
            <label>Пароль:</label>
            <input type="password" id="password" placeholder="******">
        </div>
        
        <button class="login-btn" onclick="login()">Войти в админку</button>
        
        <div class="error" id="error">Неверный пароль, попробуй еще</div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        function login() {
            const password = document.getElementById('password').value;
            
            if (password === 'mamuka123') {
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
