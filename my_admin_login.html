<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя админка - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c8b, #0a1f4a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        
        .login-container h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .login-container p {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .input-group input:focus {
            border-color: #1e3c8b;
            outline: none;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1e3c8b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .login-btn:hover {
            background: #0a1f4a;
        }
        
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Вход в статистику</h1>
        <p>Только для админа</p>
        
        <div class="input-group">
            <label>Пароль:</label>
            <input type="password" id="password" placeholder="******">
        </div>
        
        <button class="login-btn" onclick="login()">Войти</button>
        
        <div class="error" id="error">Неверный пароль</div>
    </div>

    <script>
        function login() {
            const password = document.getElementById('password').value;
            
            if (password === 'admin123') {
                sessionStorage.setItem('myAdminAuth', 'true');
                window.location.href = 'my_admin.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
