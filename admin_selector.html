<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор админки - Шаурма от Мамуки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #8b1e1e, #4a0f0f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .selector-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .admin-cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .admin-card {
            flex: 1;
            padding: 30px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            display: block;
        }
        
        .admin-card.mamuka {
            background: linear-gradient(135deg, #8b1e1e, #c13b3b);
            box-shadow: 0 5px 15px rgba(139, 30, 30, 0.4);
        }
        
        .admin-card.owner {
            background: linear-gradient(135deg, #1e3c8b, #2a4fa3);
            box-shadow: 0 5px 15px rgba(30, 60, 139, 0.4);
        }
        
        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .admin-card .emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .admin-card h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .admin-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .back-link {
            display: block;
            margin-top: 30px;
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: #8b1e1e;
        }
    </style>
</head>
<body>
    <div class="selector-container">
        <h1>🥙 Админка Мамуки</h1>
        <p class="subtitle">Выбери, кто ты сегодня</p>
        
        <div class="admin-cards">
            <a href="admin_login.html" class="admin-card mamuka">
                <div class="emoji">👨‍🍳</div>
                <h3>Я Мамука</h3>
                <p>Управлять заказами на кухне</p>
            </a>
            
            <a href="my_admin_login.html" class="admin-card owner">
                <div class="emoji">📊</div>
                <h3>Я Админ</h3>
                <p>Смотреть статистику и управлять сайтом</p>
            </a>
        </div>
        
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>
</body>
</html>
